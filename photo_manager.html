<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギャラリー画像 管理ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; border-bottom: 2px solid #ff7a1f; padding-bottom: 10px; margin-bottom: 20px; color: #ff7a1f; display: flex; justify-content: space-between; align-items: center; }
        
        .btn { background-color: #ff7a1f; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn:hover { background-color: #e66a15; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #drop-zone { border: 2px dashed #999; border-radius: 10px; padding: 50px; text-align: center; color: #666; margin-bottom: 30px; background: #fafafa; transition: 0.2s; }
        #drop-zone.dragover { border-color: #ff7a1f; background: #fff4ea; color: #ff7a1f; }
        
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .img-card { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.2); background: #eee; aspect-ratio: 1; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .delete-btn:hover { background: red; }
        
        .status { padding: 10px; margin-bottom: 20px; border-radius: 5px; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8dbdf; color: #721c24; display: block; }
        .status.warning { background: #fff3cd; color: #856404; display: block; }
        
        #setup-step { text-align: center; margin: 50px 0; }
        #main-app { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <span>デトサウナ ギャラリー管理ツール</span>
    </h1>
    
    <div id="status-message" class="status"></div>

    <div id="setup-step">
        <p>ブラウザの機能を使って直接ファイルを編集します。<br>下のボタンを押して、<b>「deto_sauna_lp」</b>フォルダを選んでください。</p>
        <p style="font-size: 0.9rem; color: #666;">※ブラウザから「ファイルの変更を許可しますか？」と聞かれたら「変更の保存を許可する」を選んでください。</p>
        <button id="select-dir-btn" class="btn" style="padding: 15px 30px; font-size: 1.2rem; margin-top: 20px;">deto_sauna_lp フォルダを選択</button>
    </div>

    <div id="main-app">
        <div id="drop-zone">
            ここに新しい写真（.jpg または .png）をドロップして追加
        </div>

        <h3 style="margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px;">現在のギャラリー写真 (<span id="img-count">0</span>枚)</h3>
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">※ここに追加・削除すると、自動的にWebサイト(js/gallery_data.js)にも反映されます。</p>
        
        <div id="gallery">
            <!-- サムネイルがここに表示されます -->
        </div>
    </div>
</div>

<script>
    let rootDirHandle = null;
    let imgDirHandle = null;
    let jsDirHandle = null;

    const setupBtn = document.getElementById('select-dir-btn');
    const setupStep = document.getElementById('setup-step');
    const mainApp = document.getElementById('main-app');
    const galleryDiv = document.getElementById('gallery');
    const dropZone = document.getElementById('drop-zone');
    const statusMsg = document.getElementById('status-message');
    const imgCountSpan = document.getElementById('img-count');

    function showStatus(msg, type) {
        statusMsg.textContent = msg;
        statusMsg.className = 'status ' + type;
        setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
    }

    setupBtn.addEventListener('click', async () => {
        try {
            // ディレクトリの選択
            rootDirHandle = await window.showDirectoryPicker();
            
            // 権限のリクエスト
            if ((await rootDirHandle.queryPermission({mode: 'readwrite'})) !== 'granted') {
                if ((await rootDirHandle.requestPermission({mode: 'readwrite'})) !== 'granted') {
                    showStatus('編集権限が拒否されました。再度お試しください。', 'error');
                    return;
                }
            }
            
            // 必要なフォルダへのアクセス確認
            try {
                imgDirHandle = await rootDirHandle.getDirectoryHandle('img');
                jsDirHandle = await rootDirHandle.getDirectoryHandle('js');
            } catch (e) {
                showStatus('指定されたフォルダ内に img または js フォルダが見つかりません。「deto_sauna_lp」フォルダを正しく選択してください。', 'error');
                return;
            }

            setupStep.style.display = 'none';
            mainApp.style.display = 'block';
            await loadImages();
            showStatus('フォルダを読み込みました！', 'success');

        } catch (error) {
            console.error(error);
            showStatus('エラーが発生しました。Google ChromeやEdgeなど最新のパソコン用ブラウザをご利用ください。', 'error');
        }
    });

    // ギャラリーの画像を読み込む
    async function loadImages() {
        galleryDiv.innerHTML = '';
        const fileNames = [];
        let count = 0;

        for await (const entry of imgDirHandle.values()) {
            if (entry.kind === 'file' && (entry.name.toLowerCase().endsWith('.jpg') || entry.name.toLowerCase().endsWith('.png') || entry.name.toLowerCase().endsWith('.jpeg'))) {
                fileNames.push('img/' + entry.name);
                const file = await entry.getFile();
                const objUrl = URL.createObjectURL(file);
                
                const div = document.createElement('div');
                div.className = 'img-card';
                div.innerHTML = `
                    <img src="${objUrl}" alt="${entry.name}">
                    <button class="delete-btn" title="削除">×</button>
                `;
                
                div.querySelector('.delete-btn').addEventListener('click', () => deleteImage(entry.name));
                galleryDiv.appendChild(div);
                count++;
            }
        }
        imgCountSpan.textContent = count;
        
        // gallery_data.js を自動更新
        await updateGalleryDataJs(fileNames);
    }

    // 画像の削除
    async function deleteImage(fileName) {
        if (!confirm(`「${fileName}」を本当に削除してよろしいですか？（※元に戻せません）`)) return;
        try {
            await imgDirHandle.removeEntry(fileName);
            showStatus('画像を削除しました', 'success');
            await loadImages();
        } catch (e) {
            console.error(e);
            showStatus('削除に失敗しました', 'error');
        }
    }

    // ドラッグ＆ドロップの処理
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', async (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/jpeg') || f.type.startsWith('image/png'));
        
        if (files.length === 0) {
            showStatus('対応している画像ファイル(jpg/png)のみドロップ可能です', 'warning');
            return;
        }

        showStatus(`${files.length}件の画像を保存しています...`, 'warning');

        try {
            for (const file of files) {
                // 同じ名前のファイルがあったら上書きされる
                const fileHandle = await imgDirHandle.getFileHandle(file.name, {create: true});
                const writable = await fileHandle.createWritable();
                await writable.write(file);
                await writable.close();
            }
            showStatus(`${files.length}件の画像を追加しました！`, 'success');
            await loadImages();
        } catch (error) {
            console.error(error);
            showStatus('画像の保存に失敗しました', 'error');
        }
    });

    // gallery_data.js の配列部分を書き換える
    async function updateGalleryDataJs(fileNames) {
        try {
            const fileHandle = await jsDirHandle.getFileHandle('gallery_data.js');
            const file = await fileHandle.getFile();
            let text = await file.text();
            
            // 配列の文字列を生成
            const arrayString = '[\n    ' + fileNames.map(name => `'${name}'`).join(',\n    ') + '\n]';
            
            // 正規表現で AVAILABLE_IMAGES = [...] の部分を置換
            const regex = /(const\s+AVAILABLE_IMAGES\s*=\s*)\[[\s\S]*?\];/;
            if (regex.test(text)) {
                text = text.replace(regex, `$1${arrayString};`);
                
                const writable = await fileHandle.createWritable();
                await writable.write(text);
                await writable.close();
                console.log('gallery_data.js was successfully updated.');
            } else {
                showStatus('gallery_data.js の配列部分が見つからず、サイトとの連携に失敗しました。', 'error');
            }
        } catch (e) {
            console.error(e);
            showStatus('gallery_data.jsの更新エラー。画像は保存されましたがサイト側への同期に失敗した可能性があります。', 'error');
        }
    }
</script>
</body>
</html>
