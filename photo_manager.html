<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秋田デトサウナ 統合ギャラリー管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #f2a65a;
            --bg: #051421;
            --card-bg: #1a1e21;
            --text: #ffffff;
            --text-sub: #b0ccd7;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.5rem; text-align: center; color: var(--primary); margin-bottom: 30px; }
        
        .settings-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn {
            background: var(--primary);
            color: #051421;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #upload-area {
            border: 2px dashed var(--primary);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            background: rgba(242, 166, 90, 0.05);
        }
        #upload-area i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }

        .gallery-section { margin-top: 40px; }
        .section-title { font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px; color: var(--text); }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        .img-item {
            position: relative;
            aspect-ratio: 1;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .img-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,0,0,0.8);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #status {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
            border: 1px solid var(--primary);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .spinner { animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-tasks"></i> デトサウナ 統合管理ツール</h1>
    
    <div id="settings-view" class="settings-card">
        <div class="input-group">
            <label>GitHubトークン (メモ帳からコピペ)</label>
            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="input-group">
            <label>リポジトリ名 (例: hot-life-plan/detosauna)</label>
            <input type="text" id="gh-repo" placeholder="hot-life-plan/detosauna">
        </div>
        <button class="btn" id="save-settings">ログインして開始</button>
        <p style="font-size: 0.7rem; color: #888; margin-top: 10px; line-height: 1.4;">
            ※鍵はブラウザに安全に記憶されます。URLが正しいか確認してください。
        </p>
    </div>

    <div id="manager-view" style="display: none;">
        <div id="upload-area">
            <input type="file" id="file-input" style="display:none" accept="image/*" multiple>
            <i class="fas fa-plus-circle"></i>
            <p style="margin:0">公式写真（img/）を追加アップロード</p>
        </div>

        <div class="gallery-section">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="section-title">公式ギャラリー写真 (img/)</div>
                <button id="refresh-btn" style="background:none; border:none; color:var(--primary); cursor:pointer;"><i class="fas fa-sync-alt"></i> 更新</button>
            </div>
            <div class="gallery-grid" id="official-grid"></div>

            <div class="section-title">ゲスト投稿写真 (img/guest/)</div>
            <div class="gallery-grid" id="guest-grid"></div>
        </div>

        <button class="btn" id="logout-btn" style="background:#222; color:#888; margin-top: 50px; font-size: 0.8rem;">設定を解除してログアウト</button>
    </div>
</div>

<div id="status"></div>

<script>
    const CONFIG = {
        TOKEN: localStorage.getItem('DETO_TOKEN'),
        REPO: localStorage.getItem('DETO_REPO'),
        BRANCH: 'main',
        JS_PATH: 'js/gallery_data.js',
        DIRS: {
            OFFICIAL: 'img',
            GUEST: 'img/guest'
        }
    };

    const statusEl = document.getElementById('status');

    function notify(msg, stay = false) {
        statusEl.innerHTML = msg;
        statusEl.style.display = 'block';
        if(!stay) setTimeout(() => statusEl.style.display = 'none', 3000);
    }

    async function ghFetch(path, options = {}) {
        const url = `https://api.github.com/repos/${CONFIG.REPO}/contents/${path}`;
        const res = await fetch(url, {
            ...options,
            headers: {
                'Authorization': `token ${CONFIG.TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json',
                ...options.headers
            }
        });
        if (!res.ok && res.status !== 404) {
            console.error('GH API ERROR:', await res.text());
            throw new Error('API通信エラー');
        }
        if (res.status === 404) return [];
        return res.json();
    }

    function updateUI() {
        if (CONFIG.TOKEN && CONFIG.REPO) {
            document.getElementById('settings-view').style.display = 'none';
            document.getElementById('manager-view').style.display = 'block';
            loadAllGalleries();
        } else {
            document.getElementById('settings-view').style.display = 'block';
            document.getElementById('manager-view').style.display = 'none';
        }
    }

    document.getElementById('save-settings').onclick = async () => {
        const token = document.getElementById('gh-token').value.trim();
        const repo = document.getElementById('gh-repo').value.trim();
        if (!token || !repo) return alert('入力してください');

        notify('<i class="fas fa-spinner spinner"></i> 接続確認中...', true);
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/${CONFIG.JS_PATH}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (res.status === 200) {
                localStorage.setItem('DETO_TOKEN', token);
                localStorage.setItem('DETO_REPO', repo);
                CONFIG.TOKEN = token;
                CONFIG.REPO = repo;
                notify('ログイン成功！');
                updateUI();
            } else {
                notify('接続失敗。鍵かリポジトリ名が違います。');
            }
        } catch (e) {
            notify('接続エラーが発生しました。');
        }
    };

    document.getElementById('logout-btn').onclick = () => {
        localStorage.clear();
        location.reload();
    };

    async function loadAllGalleries() {
        const offGrid = document.getElementById('official-grid');
        const gstGrid = document.getElementById('guest-grid');
        offGrid.innerHTML = '<p>読み込み中...</p>';
        gstGrid.innerHTML = '<p>読み込み中...</p>';

        try {
            const [offFiles, gstFiles] = await Promise.all([
                ghFetch(CONFIG.DIRS.OFFICIAL),
                ghFetch(CONFIG.DIRS.GUEST)
            ]);

            renderGrid(offGrid, offFiles, CONFIG.DIRS.OFFICIAL);
            renderGrid(gstGrid, gstFiles, CONFIG.DIRS.GUEST);
        } catch (e) {
            notify('ギャラリー取得に失敗しました。');
        }
    }

    function renderGrid(container, files, dirPath) {
        container.innerHTML = '';
        const list = Array.isArray(files) ? files : [];
        // type: 'file' であること、かつ画像拡張子であることを確認（フォルダを除外）
        const imgs = list.filter(f => f.type === 'file' && f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i));
        
        if (imgs.length === 0) {
            container.innerHTML = '<p style="color:#666; font-size:0.8rem;">表示する画像がありません</p>';
            return;
        }

        imgs.forEach(file => {
            const div = document.createElement('div');
            div.className = 'img-item';
            // フルパスを正しく組み立て（dirPathにスラッシュを補完）
            const fullPath = `${dirPath}/${file.name}`;
            div.innerHTML = `
                <img src="${file.download_url}" alt="">
                <button class="del-btn" onclick="deletePhoto('${fullPath}', '${file.sha}')"><i class="fas fa-trash-alt"></i></button>
            `;
            container.appendChild(div);
        });
    }

    document.getElementById('refresh-btn').onclick = loadAllGalleries;

    window.deletePhoto = async (fullPath, sha) => {
        if (!confirm('この画像を削除してよろしいですか？\nサイト上のリストからも自動削除されます。')) return;
        notify('<i class="fas fa-spinner spinner"></i> 削除中...', true);
        try {
            await ghFetch(fullPath, {
                method: 'DELETE',
                body: JSON.stringify({ message: `Delete ${fullPath} via UI`, sha, branch: CONFIG.BRANCH })
            });

            await syncMapping();
            notify('削除完了しました！');
            loadAllGalleries();
        } catch (e) {
            notify('削除に失敗しました。');
        }
    };

    document.getElementById('upload-area').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        notify('<i class="fas fa-spinner spinner"></i> アップロード中...', true);
        try {
            for (const file of files) {
                const reader = new FileReader();
                const base64 = await new Promise((resolve) => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });

                const filename = `official_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
                await ghFetch(`${CONFIG.DIRS.OFFICIAL}${filename}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        message: `Upload ${filename} via UI`,
                        content: base64,
                        branch: CONFIG.BRANCH
                    })
                });
            }
            await syncMapping();
            notify('アップロード成功しました！');
            loadAllGalleries();
        } catch (e) {
            notify('アップロードに失敗しました。');
        }
    };

    async function syncMapping() {
        const [offFiles, gstFiles] = await Promise.all([
            ghFetch(CONFIG.DIRS.OFFICIAL),
            ghFetch(CONFIG.DIRS.GUEST)
        ]);

        const offList = Array.isArray(offFiles) ? offFiles.filter(f => f.name.match(/\.(jpg|jpeg|png|webp)$/i)).map(f => `'img/${f.name}'`) : [];
        const gstList = Array.isArray(gstFiles) ? gstFiles.filter(f => f.name.match(/\.(jpg|jpeg|png|webp)$/i)).map(f => `'img/guest/${f.name}'`) : [];
        
        // ゲストを先頭にする（新着順にしたいのであればさらにソートが必要だが、現在は単純結合）
        const allList = [...gstList, ...offList];
        const arrayString = `const AVAILABLE_IMAGES = [\n    ${allList.join(',\n    ')}\n];`;

        const jsFile = await ghFetch(CONFIG.JS_PATH);
        let content = decodeURIComponent(escape(atob(jsFile.content)));
        
        const regex = /const\s+AVAILABLE_IMAGES\s*=\s*\[[\s\S]*?\];/;
        content = content.replace(regex, arrayString);

        await ghFetch(CONFIG.JS_PATH, {
            method: 'PUT',
            body: JSON.stringify({
                message: 'Sync gallery mapping via UI',
                content: btoa(unescape(encodeURIComponent(content))),
                sha: jsFile.sha,
                branch: CONFIG.BRANCH
            })
        });
    }

    updateUI();
</script>
</body>
</html>
