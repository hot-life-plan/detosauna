<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【公式】秋田デトサウナ | 写真管理マネージャー</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0d1a13;
            --accent: #f2a65a;
            --danger: #e74c3c;
            --text: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .auth-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-debug { background: #3498db; color: white; margin-left:10px; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
        }

        .panel h2 {
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            margin-top: 0;
            font-size: 1.2rem;
        }

        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #000;
        }

        .img-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 5px;
            overflow: hidden;
            background: #222;
        }

        .img-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .del-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 3px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #333;
            padding: 10px 20px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        #debug-log {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            margin-top: 20px;
            border-radius: 5px;
            height: 150px;
            overflow-y: auto;
            font-size: 0.8rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-tasks"></i> 写真管理マネージャー</h1>
        <div id="repo-status">
            <button class="btn-primary" onclick="loadAllGalleries()"><i class="fas fa-sync"></i> 一括読込</button>
            <button class="btn-debug" onclick="toggleDebug()"><i class="fas fa-bug"></i> デバッグ</button>
        </div>
    </header>

    <div class="auth-box">
        <label>GitHub PAT: </label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
        <button class="btn-primary" onclick="saveToken()">トークン保存</button>
        <p style="font-size: 0.8rem; color: #aaa; margin-top:5px;">※リポジトリ(repo)権限のあるトークンが必要です。ブラウザに保存されます。</p>
    </div>

    <div id="debug-log"></div>

    <div class="dashboard">
        <!-- 公式写真パネル -->
        <div class="panel">
            <h2><i class="fas fa-image"></i> 公式写真 (img/)</h2>
            <div style="margin:10px 0; padding:10px; background:rgba(255,255,255,0.05); border-radius:5px;">
                <p style="font-size:0.8rem; margin-bottom:5px;">新しく公式画像を追加:</p>
                <input type="file" id="official-file" style="width:200px; font-size:0.8rem;">
                <button class="btn-primary" onclick="uploadOfficial()" style="padding:5px 10px; font-size:0.8rem;">アップロード</button>
            </div>
            <div id="official-grid" class="img-grid">読込中...</div>
        </div>

        <!-- 投稿写真パネル -->
        <div class="panel">
            <h2><i class="fas fa-user-friends"></i> 投稿写真 (img/guest/)</h2>
            <div id="guest-grid" class="img-grid">読込中...</div>
        </div>
    </div>

    <div class="panel" style="margin-top: 30px;">
        <h2><i class="fas fa-tools"></i> メンテナンス</h2>
        <p>全データの整合性をチェックし、js/gallery_data.js を最新の状態に同期します。</p>
        <button class="btn-primary" onclick="syncMapping()"><i class="fas fa-save"></i> gallery_data.js を更新保存</button>
    </div>
</div>

<div class="status-bar" id="status-bar">
    <span>Ready</span>
    <span id="api-usage">API: -</span>
</div>

<script>
    const CONFIG = {
        OWNER: 'hot-life-plan',
        REPO: 'detosauna',
        BRANCH: 'main',
        JS_PATH: 'js/gallery_data.js',
        DIRS: {
            OFFICIAL: 'img',
            GUEST: 'img/guest'
        }
    };

    let logs = [];

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logs.push(`[${time}] ${msg}`);
        const logEl = document.getElementById('debug-log');
        logEl.innerHTML = logs.join('<br>');
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
    }

    function toggleDebug() {
        const el = document.getElementById('debug-log');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function saveToken() {
        const token = document.getElementById('gh-token').value;
        if (token) {
            localStorage.setItem('gh_token_deto', token);
            alert('トークンを保存しました');
            loadAllGalleries();
        }
    }

    async function ghFetch(path, options = {}) {
        const token = localStorage.getItem('gh_token_deto');
        if (!token) {
            log('Error: トークンが設定されていません');
            throw new Error('No Token');
        }

        // キャッシュ破りのためのタイムスタンプを追加
        const ts = Date.now();
        const url = `https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${path}?t=${ts}`;
        log(`Fetching: ${url}`);

        const res = await fetch(url, {
            ...options,
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json',
                ...options.headers
            }
        });

        // API制限の表示
        const rateRemaining = res.headers.get('x-ratelimit-remaining');
        document.getElementById('api-usage').innerText = `API: ${rateRemaining}回残`;

        if (!res.ok) {
            const errBody = await res.text();
            log(`API Error (${res.status}): ${errBody}`);
            if (res.status === 404) return []; // フォルダなし
            throw new Error(`GH API ERROR: ${res.status}`);
        }

        return res.json();
    }

    // 公式画像のアップロード
    async function uploadOfficial() {
        const fileInput = document.getElementById('official-file');
        if (!fileInput.files || fileInput.files.length === 0) {
            alert('ファイルを選んでください');
            return;
        }

        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        const path = `${CONFIG.DIRS.OFFICIAL}/${fileName}`;

        try {
            log(`公式アップロード開始: ${path}`);
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Content = e.target.result.split(',')[1];
                await ghFetch(path, {
                    method: 'PUT',
                    body: JSON.stringify({
                        message: `Upload official photo via manager: ${fileName}`,
                        content: base64Content,
                        branch: CONFIG.BRANCH
                    })
                });
                log('アップロード成功！');
                alert('公式写真を追加しました。ギャラリーの同期を行います。');
                syncMapping(); // 追加したら自動でマッピング更新
            };
            reader.readAsDataURL(file);
        } catch (e) {
            log(`アップロードエラー: ${e.message}`);
            alert('失敗しました: ' + e.message);
        }
    }

    async function loadAllGalleries() {
        const btn = document.querySelector('button[onclick="loadAllGalleries()"]');
        const originalText = btn.innerHTML;
        try {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 読込中...';
            document.getElementById('official-grid').innerText = '通信中...';
            document.getElementById('guest-grid').innerText = '通信中...';

            log('--- 全読込開始 ---');
            const [offFiles, guestFiles] = await Promise.all([
                ghFetch(CONFIG.DIRS.OFFICIAL),
                ghFetch(CONFIG.DIRS.GUEST)
            ]);

            log(`公式: ${offFiles.length}個のアイテムを検出`);
            log(`ゲスト: ${guestFiles.length}個のアイテムを検出`);

            renderGrid(document.getElementById('official-grid'), offFiles, CONFIG.DIRS.OFFICIAL);
            renderGrid(document.getElementById('guest-grid'), guestFiles, CONFIG.DIRS.GUEST);

            document.getElementById('status-bar').firstElementChild.innerText = 'データ読込完了';
        } catch (e) {
            log(`致命的なエラー: ${e.message}`);
            alert('データの取得に失敗しました。');
        } finally {
            btn.innerHTML = originalText;
        }
    }

    function renderGrid(container, files, dirPath) {
        container.innerHTML = '';
        if (!Array.isArray(files)) {
            container.innerHTML = 'データなし';
            return;
        }

        const imgs = files.filter(f => f.type === 'file' && f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i));
        
        if (imgs.length === 0) {
            container.innerHTML = '<p style="color:#aaa; font-size:0.8rem; padding:20px;">画像はありません</p>';
            return;
        }

        imgs.forEach(file => {
            const div = document.createElement('div');
            div.className = 'img-item';
            div.innerHTML = `
                <img src="${file.download_url}" alt="">
                <button class="del-btn" onclick="deletePhoto(this, '${file.path}', '${file.sha}')"><i class="fas fa-trash-alt"></i></button>
            `;
            container.appendChild(div);
        });
    }

    async function deletePhoto(btn, path, sha) {
        if (!confirm(`この写真を完全に削除しますか？\n${path}`)) return;
        const originalHtml = btn.innerHTML;
        
        try {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            log(`削除実行: ${path}`);
            await ghFetch(path, {
                method: 'DELETE',
                body: JSON.stringify({
                    message: `Delete photo: ${path}`,
                    sha: sha,
                    branch: CONFIG.BRANCH
                })
            });
            alert('削除しました。');
            loadAllGalleries();
        } catch (e) {
            alert('削除失敗: ' + e.message);
            btn.innerHTML = originalHtml;
        }
    }

    async function syncMapping() {
        if (!confirm(' gallery_data.js を更新してサイトを最新の状態にしますか？')) return;
        const btn = document.querySelector('button[onclick="syncMapping()"]');
        const originalText = btn.innerHTML;

        try {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同期中...';
            log('--- 同期処理開始 ---');
            const [offFiles, guestFiles] = await Promise.all([
                ghFetch(CONFIG.DIRS.OFFICIAL),
                ghFetch(CONFIG.DIRS.GUEST)
            ]);

            const allPaths = [];
            offFiles.filter(f => f.type === 'file' && f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i))
                    .forEach(f => allPaths.push(f.path));
            
            guestFiles.filter(f => f.type === 'file' && f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i))
                     .forEach(f => allPaths.push(f.path));

            const jsContent = `const AVAILABLE_IMAGES = ${JSON.stringify(allPaths, null, 2)};`;
            const currentJs = await ghFetch(CONFIG.JS_PATH);
            
            await ghFetch(CONFIG.JS_PATH, {
                method: 'PUT',
                body: JSON.stringify({
                    message: "Update gallery mapping via manager",
                    content: btoa(unescape(encodeURIComponent(jsContent))),
                    sha: currentJs.sha,
                    branch: CONFIG.BRANCH
                })
            });

            alert('同期が完了しました！');
        } catch (e) {
            alert('同期失敗: ' + e.message);
        } finally {
            btn.innerHTML = originalText;
        }
    }

    // 初期化
    const savedToken = localStorage.getItem('gh_token_deto');
    if (savedToken) {
        document.getElementById('gh-token').value = savedToken;
        loadAllGalleries();
    }
</script>

</body>
</html>
